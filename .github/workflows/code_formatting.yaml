name: Check code formatting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Check code formatting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Generate project from template
        run: >
          uvx copier copy . /tmp/test_project
          --data project_name=test_project
          --defaults
          --overwrite

      - name: Install dependencies
        working-directory: /tmp/test_project
        run: uv sync --dev

      - name: ruff check
        working-directory: /tmp/test_project
        run: uv run ruff check .

      - name: ruff format
        working-directory: /tmp/test_project
        run: uv run ruff format --check .
