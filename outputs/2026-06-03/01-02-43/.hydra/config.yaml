project_name: dummy_experiment
task_name: dummy_task
continue_from_id: false
ckpt_filename: null
seed: 42
compile: false
phase: train
trainer:
  max_epochs: 3
  accelerator: cpu
  log_every_n_steps: 100
  reload_dataloaders_every_n_epochs: 1
  fast_dev_run: false
  num_sanity_val_steps: 0
  val_check_interval: 1.0
  profiler: simple
  enable_checkpointing: true
data:
  _target_: module_name.data_modules.BaseDM
  trainset:
    _target_: module_name.datasets.dummy.DummyDataset
    size: 10000
  valset:
    _target_: module_name.datasets.dummy.DummyDataset
    size: 2000
  testset:
    _target_: module_name.datasets.dummy.DummyDataset
    size: 2000
  batch_size: 16
model:
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 0.0001
    weight_decay: 0.0
  lr_scheduler:
    scheduler:
      _target_: torch.optim.lr_scheduler.ConstantLR
      _partial_: true
      factor: 1.0
      total_iters: 1
    monitor: val_loss
    interval: step
    frequency: 1
  _target_: module_name.lightning_modules.DummyModule
  network:
    _target_: module_name.networks.DummyNetwork
    input_size: 10
    output_size: 1
  loss_fn:
    _target_: module_name.losses.MSELoss
callbacks:
  lr_monitor:
    _target_: pytorch_lightning.callbacks.LearningRateMonitor
    logging_interval: step
  log_loss_callback:
    _target_: module_name.callbacks.LogLossCallback
  modelcheckpoint:
    _target_: pytorch_lightning.callbacks.ModelCheckpoint
    monitor: val_loss
    mode: min
    save_top_k: 1
    save_last: true
  log_grads_callback:
    _target_: module_name.callbacks.LogGradsCallback
  batches_per_second:
    _target_: module_name.callbacks.BatchesPerSecondCallback
  parameter_count:
    _target_: module_name.callbacks.ParameterCountCallback
    depth: 3
logger:
  save_dir: logs
  offline: false
  log_model: false
